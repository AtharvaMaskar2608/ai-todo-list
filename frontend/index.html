<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ My Tasks</title>

  <!-- Inter (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configure Tailwind BEFORE first use: class-based dark mode + Inter font.
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Project stylesheet (custom animations / glassmorphism beyond Tailwind) -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body
  class="min-h-screen bg-gradient-to-br from-violet-100 via-sky-100 to-cyan-100 text-slate-800 antialiased font-sans transition-colors duration-300 dark:from-slate-900 dark:via-slate-900 dark:to-slate-800 dark:text-slate-100"
>
  <!-- Toast container (chrome, owned by shell) -->
  <div
    id="toast-container"
    class="fixed top-5 right-5 z-[100] flex flex-col gap-3 w-[min(360px,calc(100vw-2.5rem))]"
    aria-live="polite"
    aria-atomic="true"
  ></div>

  <main class="mx-auto w-full max-w-[900px] px-4 py-8 sm:px-6 sm:py-12">
    <!-- ===================== Header ===================== -->
    <header class="mb-8 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight sm:text-4xl">
          <span class="bg-gradient-to-r from-indigo-600 to-sky-500 bg-clip-text text-transparent">✨ My Tasks</span>
        </h1>
        <p class="mt-1 text-sm font-medium text-slate-500 dark:text-slate-400">
          Stay productive today.
        </p>
      </div>

      <!-- Dark-mode toggle -->
      <button
        id="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        class="grid h-11 w-11 shrink-0 place-items-center rounded-full bg-white/70 text-slate-600 shadow-md ring-1 ring-black/5 backdrop-blur transition hover:scale-105 hover:text-indigo-600 dark:bg-white/10 dark:text-slate-200 dark:hover:text-sky-400"
      >
        <!-- Sun (shown in dark mode) -->
        <svg class="hidden h-5 w-5 dark:block" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg class="h-5 w-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      </button>
    </header>

    <!-- Motivational quote (chrome, owned by shell) -->
    <p
      id="quote"
      class="mb-8 rounded-2xl bg-white/60 px-5 py-4 text-center text-base font-medium text-slate-600 shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/5 dark:text-slate-300"
    ></p>

    <!-- ===================== Search ===================== -->
    <div class="relative mb-6">
      <svg class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
      <input
        id="search-input"
        type="search"
        placeholder="Search tasks…"
        class="w-full rounded-2xl border-0 bg-white/70 py-3 pl-12 pr-4 text-base text-slate-800 shadow-sm ring-1 ring-black/5 backdrop-blur transition placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-white/10 dark:text-slate-100"
      />
    </div>

    <!-- ===================== Task form ===================== -->
    <form
      id="todo-form"
      class="mb-8 rounded-2xl bg-white/70 p-5 shadow-md ring-1 ring-black/5 backdrop-blur dark:bg-white/5 sm:p-6"
    >
      <div class="flex flex-col gap-4">
        <div>
          <label for="todo-title" class="mb-1 block text-sm font-semibold text-slate-600 dark:text-slate-300">Title</label>
          <input
            id="todo-title"
            name="title"
            type="text"
            maxlength="100"
            required
            placeholder="What needs to be done?"
            class="w-full rounded-xl border-0 bg-white/80 px-4 py-3 text-base text-slate-800 shadow-sm ring-1 ring-black/5 transition placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-white/10 dark:text-slate-100"
          />
        </div>
        <div>
          <label for="todo-desc" class="mb-1 block text-sm font-semibold text-slate-600 dark:text-slate-300">Description</label>
          <textarea
            id="todo-desc"
            name="description"
            rows="2"
            maxlength="500"
            placeholder="Add more details (optional)…"
            class="w-full resize-none rounded-xl border-0 bg-white/80 px-4 py-3 text-base text-slate-800 shadow-sm ring-1 ring-black/5 transition placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-white/10 dark:text-slate-100"
          ></textarea>
        </div>
        <button
          type="submit"
          class="inline-flex items-center justify-center gap-2 self-start rounded-xl bg-indigo-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-indigo-600/25 transition hover:bg-indigo-700 hover:shadow-indigo-600/40 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60 dark:focus:ring-offset-slate-900"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Add Task
        </button>
      </div>
    </form>

    <!-- ===================== Statistics cards ===================== -->
    <div class="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-3">
      <div class="rounded-2xl bg-white/70 p-5 text-center shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/5">
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">All Tasks</p>
        <p id="stat-all" class="mt-1 text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">0</p>
      </div>
      <div class="rounded-2xl bg-white/70 p-5 text-center shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/5">
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Active</p>
        <p id="stat-active" class="mt-1 text-3xl font-extrabold text-sky-500 dark:text-sky-400">0</p>
      </div>
      <div class="rounded-2xl bg-white/70 p-5 text-center shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/5">
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Completed</p>
        <p id="stat-completed" class="mt-1 text-3xl font-extrabold text-emerald-500 dark:text-emerald-400">0</p>
      </div>
    </div>

    <!-- ===================== Progress bar ===================== -->
    <div class="mb-8">
      <div class="mb-2 flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-600 dark:text-slate-300">Progress</span>
        <span id="progress-label" class="text-sm font-semibold text-slate-500 dark:text-slate-400">0% Complete</span>
      </div>
      <div class="h-3 w-full overflow-hidden rounded-full bg-white/70 ring-1 ring-black/5 dark:bg-white/10">
        <div
          id="progress-bar"
          class="h-full w-0 rounded-full bg-gradient-to-r from-indigo-600 to-sky-500 transition-[width] duration-500 ease-out"
        ></div>
      </div>
    </div>

    <!-- ===================== Filter buttons ===================== -->
    <div class="mb-6 flex flex-wrap gap-2" role="group" aria-label="Filter tasks">
      <button
        id="filter-all"
        type="button"
        class="rounded-full bg-indigo-600 px-5 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900"
      >
        All
      </button>
      <button
        id="filter-active"
        type="button"
        class="rounded-full bg-white/70 px-5 py-2 text-sm font-semibold text-slate-600 shadow-sm ring-1 ring-black/5 backdrop-blur transition hover:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:bg-white/10 dark:text-slate-300 dark:hover:bg-white/20 dark:focus:ring-offset-slate-900"
      >
        Active
      </button>
      <button
        id="filter-completed"
        type="button"
        class="rounded-full bg-white/70 px-5 py-2 text-sm font-semibold text-slate-600 shadow-sm ring-1 ring-black/5 backdrop-blur transition hover:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:bg-white/10 dark:text-slate-300 dark:hover:bg-white/20 dark:focus:ring-offset-slate-900"
      >
        Completed
      </button>
    </div>

    <!-- ===================== Task list ===================== -->
    <section aria-label="Task list">
      <ul id="todo-list" class="flex flex-col gap-3"></ul>

      <!-- Empty state (hidden by default; features toggle it) -->
      <div id="empty-state" class="hidden flex-col items-center justify-center rounded-2xl bg-white/60 px-6 py-16 text-center shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/5">
        <div class="text-5xl">🗒️</div>
        <p class="mt-4 text-lg font-semibold text-slate-600 dark:text-slate-300">No tasks yet</p>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Add your first task above to get started.</p>
      </div>
    </section>
  </main>

  <!-- ===================== Edit modal (hidden; features populate/drive) ===================== -->
  <div
    id="edit-modal"
    class="hidden fixed inset-0 z-50 items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="edit-modal-title"
  >
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-black/5 dark:bg-slate-800">
      <h2 id="edit-modal-title" class="text-xl font-bold text-slate-800 dark:text-slate-100">Edit Task</h2>
      <div data-modal-body class="mt-4"></div>
    </div>
  </div>

  <!-- ===================== Delete confirmation modal ===================== -->
  <div
    id="delete-modal"
    class="hidden fixed inset-0 z-50 items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-modal-title"
  >
    <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-black/5 dark:bg-slate-800">
      <h2 id="delete-modal-title" class="text-xl font-bold text-slate-800 dark:text-slate-100">Delete Task?</h2>
      <div data-modal-body class="mt-4"></div>
    </div>
  </div>

  <!-- ===================== AI assistant panel (bottom-right) ===================== -->
  <div id="ai-panel" class="fixed bottom-5 right-5 z-40 flex flex-col items-end gap-3">
    <!-- Chat window (hidden until toggled by the chat feature) -->
    <div
      class="hidden w-[min(380px,calc(100vw-2.5rem))] flex-col overflow-hidden rounded-2xl bg-white/90 shadow-2xl ring-1 ring-black/5 backdrop-blur dark:bg-slate-800/90"
      data-ai-window
    >
      <div class="flex items-center gap-2 bg-gradient-to-r from-indigo-600 to-sky-500 px-4 py-3 text-white">
        <span class="text-lg">🤖</span>
        <span class="font-semibold">AI Assistant</span>
      </div>
      <div id="ai-messages" class="flex max-h-[50vh] min-h-[160px] flex-col gap-3 overflow-y-auto px-4 py-4"></div>
      <div class="flex items-center gap-2 border-t border-black/5 p-3 dark:border-white/10">
        <input
          id="ai-input"
          type="text"
          placeholder="Type a message…"
          class="min-w-0 flex-1 rounded-full border-0 bg-slate-100 px-4 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-white/10 dark:text-slate-100"
        />
        <button
          id="ai-send"
          type="button"
          class="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-indigo-600 text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          aria-label="Send message"
        >
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Floating toggle button -->
    <button
      id="ai-toggle"
      type="button"
      aria-label="Toggle AI assistant"
      class="grid h-14 w-14 place-items-center rounded-full bg-gradient-to-br from-indigo-600 to-sky-500 text-2xl text-white shadow-xl shadow-indigo-600/30 transition hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900"
    >
      🤖
    </button>
  </div>

  <!-- Single module entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
